<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KORE 360 · Sports Management Careers with Krish Lalwani</title>
    <meta name="description" content="Careers in sports management with Krish Lalwani. Sessions, courses, jobs and events, all in one place." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- load non-blocking: print media doesn't apply on screen, so the browser fetches it without blocking render, then onload swaps it to apply everywhere -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700;1,900&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700;1,900&display=swap" /></noscript>
    <!-- mirrors data.js IMAGES.heroCentered — keep these in sync; this lets the browser start fetching the LCP image before the JS bundle parses -->
    <link rel="preload" as="image" fetchpriority="high" href="https://loremflickr.com/1920/1200/cricket,stadium,match?lock=5" />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('kore-theme');
          var theme = stored === 'light' || stored === 'dark'
            ? stored
            : (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
